name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NASM and Inno Setup
        run: choco install nasm innosetup -y --no-progress

      - name: Add Strawberry Perl and NASM to PATH
        shell: pwsh
        run: |
          'C:\Strawberry\perl\bin' | Out-File -FilePath $env:GITHUB_PATH -Append
          'C:\Program Files\NASM'  | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Determine version label
        id: meta
        shell: pwsh
        run: |
          $ref = '${{ github.ref_name }}'
          if ($ref -match '^v(.+)$') {
              $version = $Matches[1]
          } else {
              $version = 'dev'
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "version=$version"

      - name: Build + test + stage + installer
        shell: pwsh
        run: .\pack.ps1 -Version '${{ steps.meta.outputs.version }}'

      - name: Package ZIP of staged tree
        id: pkg
        shell: pwsh
        run: |
          $version = '${{ steps.meta.outputs.version }}'
          $zip   = "OpenSSL-Win64-$version.zip"
          $setup = "dist\OpenSSL-Win64-$version-setup.exe"
          Compress-Archive -Path '.stage\Program Files\*' -DestinationPath $zip
          "zip=$zip"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "setup=$setup" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-Item $zip, $setup | Select-Object Name, Length

      - name: Upload artifacts (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: OpenSSL-Win64-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.setup }}

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.zip }}
            ${{ steps.pkg.outputs.setup }}
          generate_release_notes: true
